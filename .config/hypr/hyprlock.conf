# General behavior configuration
general {
    disable_loading_bar = true
    hide_cursor = true
}

# Background configuration (Uses a blurred desktop screenshot)
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    color = rgba(17, 17, 17, 1.0)
}

# Password Input Field
input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    fade_on_empty = false
    placeholder_text = <i>Input Password...</i>
    
    position = 0, -20
    halign = center
    valign = center
}

# Clock Display Label
label {
    monitor =
    text = $TIME
    color = rgba(200, 200, 200, 1.0)
    font_size = 55
    font_family = Noto Sans

    position = 0, 80
    halign = center
    valign = center
}
